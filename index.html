<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Facebook Open Graph Meta Tags -->
    <meta property="og:title" id="og-title" content="Movie Trailer & Info">
    <meta property="og:description" id="og-desc" content="Watch the latest movie trailer and discover the cast.">
    <meta property="og:image" id="og-image" content="">
    <meta property="og:type" content="video.movie">
    <meta property="og:url" content="">
    
    <title id="page-title">Loading Movie...</title>
    
    <!-- Tailwind CSS for rapid, compact UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    aspectRatio: { '4/5': '4 / 5' }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for a sleeker look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans antialiased">

    <!-- Main Container: Tight padding & max width -->
    <div class="max-w-7xl mx-auto p-2 sm:p-4 flex flex-col gap-3">
        
        <!-- Top Section: Video & Details -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-3">
            
            <!-- Video Player Widget -->
            <div class="lg:col-span-2 bg-gray-900 rounded-lg overflow-hidden shadow-lg border border-gray-800">
                <div class="aspect-video w-full bg-black relative" id="video-container">
                    <iframe id="movie-trailer" class="w-full h-full absolute top-0 left-0" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>

            <!-- Movie Info Widget -->
            <div class="bg-gray-900 rounded-lg p-3 shadow-lg border border-gray-800 flex flex-col gap-2">
                <h1 id="movie-title" class="text-2xl font-bold text-white leading-tight">...</h1>
                <div class="flex flex-wrap items-center gap-2 text-xs font-semibold text-gray-400">
                    <span id="movie-year" class="bg-gray-800 px-2 py-1 rounded">...</span>
                    <span id="movie-rating" class="bg-yellow-500/20 text-yellow-500 px-2 py-1 rounded">⭐ ...</span>
                    <span id="movie-runtime" class="bg-gray-800 px-2 py-1 rounded">... min</span>
                </div>
                
                <p id="movie-desc" class="text-sm text-gray-300 mt-1 leading-snug line-clamp-5"></p>
                
                <!-- Cast Compact List -->
                <div class="mt-auto pt-2 border-t border-gray-800">
                    <h3 class="text-xs font-bold text-gray-500 uppercase mb-1">Top Cast</h3>
                    <div id="movie-cast" class="flex flex-wrap gap-1">
                        <!-- Cast items injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Related Movies Section -->
        <div class="bg-gray-900 rounded-lg p-3 shadow-lg border border-gray-800">
            <h2 class="text-base font-bold text-white mb-2 flex items-center justify-between">
                <span>Related Movies</span>
            </h2>
            
            <!-- Grid: 6 Items, tight gap -->
            <div id="related-movies" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2">
                <!-- Related items injected here -->
            </div>
        </div>

    </div>

    <!-- 10x Logic & API Integration -->
    <script>
        // CONFIGURATION - Put your TMDB API Key here
        const API_KEY = 'YOUR_TMDB_API_KEY_HERE'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_BASE_URL = 'https://image.tmdb.org/t/p/w500';
        
        // Target Movie ID (e.g., 157336 for Interstellar, 550 for Fight Club)
        // You can also make this dynamic via URL params: new URLSearchParams(window.location.search).get('id')
        const MOVIE_ID = '157336'; 

        async function fetchMovieData() {
            try {
                // Fetch Details, Videos, and Credits concurrently for speed
                const [detailsRes, videosRes, creditsRes, similarRes] = await Promise.all([
                    fetch(`${BASE_URL}/movie/${MOVIE_ID}?api_key=${API_KEY}`),
                    fetch(`${BASE_URL}/movie/${MOVIE_ID}/videos?api_key=${API_KEY}`),
                    fetch(`${BASE_URL}/movie/${MOVIE_ID}/credits?api_key=${API_KEY}`),
                    fetch(`${BASE_URL}/movie/${MOVIE_ID}/similar?api_key=${API_KEY}`)
                ]);

                const details = await detailsRes.json();
                const videos = await videosRes.json();
                const credits = await creditsRes.json();
                const similar = await similarRes.json();

                updateUI(details, videos.results, credits.cast, similar.results);
                updateMetaTags(details);

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('movie-title').innerText = "Error loading data. Check API Key.";
            }
        }

        function updateUI(movie, videos, cast, similarMovies) {
            // 1. Update Basic Details
            document.getElementById('movie-title').innerText = movie.title;
            document.getElementById('page-title').innerText = `${movie.title} - Watch Trailer`;
            document.getElementById('movie-year').innerText = movie.release_date ? movie.release_date.split('-')[0] : 'N/A';
            document.getElementById('movie-rating').innerText = `⭐ ${movie.vote_average.toFixed(1)}`;
            document.getElementById('movie-runtime').innerText = movie.runtime;
            document.getElementById('movie-desc').innerText = movie.overview;

            // 2. Set Trailer Video
            const trailer = videos.find(v => v.type === 'Trailer' && v.site === 'YouTube') || videos[0];
            if (trailer) {
                document.getElementById('movie-trailer').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=0&rel=0&modestbranding=1`;
            } else {
                document.getElementById('video-container').innerHTML = `<div class="w-full h-full flex items-center justify-center text-gray-500">No trailer available</div>`;
            }

            // 3. Populate Cast (Top 6)
            const castContainer = document.getElementById('movie-cast');
            castContainer.innerHTML = cast.slice(0, 6).map(actor => `
                <span class="bg-gray-800 text-gray-300 text-[10px] px-2 py-1 rounded border border-gray-700">
                    ${actor.name}
                </span>
            `).join('');

            // 4. Populate 6 Related Movies with 4:5 Thumbnails
            // Randomize the results to get different movies each load
            const shuffledSimilar = similarMovies.sort(() => 0.5 - Math.random()).slice(0, 6);
            const relatedContainer = document.getElementById('related-movies');
            
            relatedContainer.innerHTML = shuffledSimilar.map(sim => `
                <a href="#" class="group block relative rounded overflow-hidden cursor-pointer border border-gray-800 hover:border-gray-500 transition-colors">
                    <div class="aspect-4/5 w-full bg-gray-800">
                        <img src="${sim.poster_path ? IMG_BASE_URL + sim.poster_path : 'https://via.placeholder.com/400x500?text=No+Image'}" 
                             alt="${sim.title}" 
                             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                    </div>
                    <!-- Gradient Overlay & Title -->
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-2 pt-6">
                        <h4 class="text-[11px] font-bold text-white line-clamp-2 leading-tight">${sim.title}</h4>
                    </div>
                </a>
            `).join('');
        }

        function updateMetaTags(movie) {
            // Update FB Open Graph Tags via JS
            document.getElementById('og-title').setAttribute('content', `${movie.title} - Official Trailer & Info`);
            document.getElementById('og-desc').setAttribute('content', movie.overview);
            if (movie.backdrop_path) {
                document.getElementById('og-image').setAttribute('content', `${IMG_BASE_URL}${movie.backdrop_path}`);
            }
            document.querySelector('meta[property="og:url"]').setAttribute('content', window.location.href);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', fetchMovieData);
    </script>
</body>
</html>
